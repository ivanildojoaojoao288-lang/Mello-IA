<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>IA Chat</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- TOPO -->
    <div class="header">
        IVANILDO IA
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div class="input-area">
        <input id="msg" type="text" placeholder="Escreve aqui..." onkeydown="if(event.key === 'Enter') send()">
        <button onclick="send()">Enviar</button>
    </div>

</div>

<!-- JS -->
<script>
// 🧠 Variável global para reter o histórico da sessão atual do utilizador
let chatHistory = []; 

function send() {
    let msg = document.getElementById("msg").value;

    if (!msg.trim()) return;

    let chat = document.getElementById("chat");

    // USER MESSAGE
    let userDiv = document.createElement("div");
    userDiv.className = "msg-user";
    userDiv.textContent = msg;
    chat.appendChild(userDiv);

    // LIMPA INPUT
    document.getElementById("msg").value = "";

    // LOADING
    let loading = document.createElement("div");
    loading.className = "msg-ai";
    loading.textContent = "A pensar...";
    chat.appendChild(loading);

    chat.scrollTop = chat.scrollHeight;

    // REQUEST PARA FLASK (Agora enviando o histórico acumulado)
    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: msg,
            history: chatHistory // 🚀 Enviamos o histórico atualizado
        })
    })
    .then(res => res.json())
    .then(data => {
        loading.remove();

        if (data.error) {
            let errorDiv = document.createElement("div");
            errorDiv.className = "msg-ai";
            errorDiv.style.color = "red";
            errorDiv.textContent = "Erro: " + data.error;
            chat.appendChild(errorDiv);
            return;
        }

        // 🧠 Atualizamos o histórico local com o que o backend nos devolveu
        chatHistory = data.history;

        let aiDiv = document.createElement("div");
        aiDiv.className = "msg-ai";
        aiDiv.textContent = data.reply;

        chat.appendChild(aiDiv);
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        loading.textContent = "Erro na ligação com a IA";
        loading.style.color = "red";
    });
}
</script>

</body>
</html>
