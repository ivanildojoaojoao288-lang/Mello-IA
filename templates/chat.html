<div id="chat-box"></div>
<input type="text" id="user-input" placeholder="Escreva algo...">
<button onclick="enviarMensagem()">Enviar</button>

<script>
async function enviarMensagem() {
    const input = document.getElementById('user-input');
    const msg = input.value;
    console.log("A enviar:", msg); // Verificamos se isto aparece no F12

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        console.log("Resposta recebida:", data.reply); // Verificamos a resposta
        document.getElementById('chat-box').innerHTML += `<p>IA: ${data.reply}</p>`;
    } catch (e) {
        console.error("Erro no Fetch:", e);
    }
}
</script>
