<script>
window.onload = function () {
    let chat = document.getElementById("chat");
    chat.innerHTML += `
        <div class="msg bot">
            <div class="bubble">
                🤖 Bem-vindo à <b>Mello IA</b>, criada pelo Eng. Ivanildo 👨‍💻
            </div>
        </div>
    `;
};

function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    let chat = document.getElementById("chat");

    // Correção: Agora usa as classes .msg e .user que tens no CSS
    chat.innerHTML += `
        <div class="msg user">
            <div class="bubble">${msg}</div>
        </div>
    `;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        // Correção: Agora usa as classes .msg e .bot que tens no CSS
        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble">${data.reply}</div>
            </div>
        `;

        document.getElementById("msg").value = "";
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>
