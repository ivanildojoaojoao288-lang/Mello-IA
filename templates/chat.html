<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <title>Mello IA | Online</title>
    <style>
        body { background: #030711; color: #d1d5db; font-family: monospace; padding: 20px; }
        #console { height: 400px; border: 1px solid #1e293b; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; }
    </style>
</head>
<body>
    <div id="console"></div>
    <input type="text" id="cmd" placeholder="Input...">
    <button onclick="send()">ENVIAR</button>

    <script>
        async function send() {
            const msg = document.getElementById('cmd').value;
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            document.getElementById('console').innerHTML += `<div>> ${data.response}</div>`;
        }
    </script>
</body>
</html>
