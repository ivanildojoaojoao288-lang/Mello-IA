<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <title>Mello IA | Enterprise Edition</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #2563eb; --text: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 8px; max-width: 70%; line-height: 1.6; }
        .user { background: var(--accent); align-self: flex-end; }
        .ia { background: var(--panel); align-self: flex-start; border: 1px solid #334155; }
        .input-zone { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: var(--bg); color: white; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent); color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header><strong>Mello IA 5 Pro</strong> <span id="status">● Online</span></header>
    <div id="chat"></div>
    <div class="input-zone">
        <input type="text" id="input" placeholder="Comando de sistema..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">Executar</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            if (!input.value.trim()) return;
            
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            const msg = input.value;
            input.value = "";
            
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            chat.innerHTML += `<div class="msg ia">${data.response}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
