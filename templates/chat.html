<script>
let chatHistory = []; 
let recognition;
let modoVozAtivo = false;
let deveraGravar = false;
let estaAProcessarVoz = false; // Bloqueio de segurança contra loops cegos

window.onload = function () {
    let chat = document.getElementById("chat");
    chat.innerHTML += `
        <div class="msg bot">
            <div class="bubble">
                🤖 Infraestrutura neural ativa. Clica em <b>🎙️ Ativar Mãos Livres</b>, dá permissão ao microfone e fala diretamente!
            </div>
        </div>
    `;
    inicializarRecursosVoz();
};

function inicializarRecursosVoz() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        console.log("O teu navegador não suporta a API de áudio nativa.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-PT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function() {
        estaAProcessarVoz = true;
    };

    recognition.onresult = function(event) {
        let textoCapturado = event.results[0][0].transcript;
        document.getElementById("msg").value = textoCapturado;
        send();
    };

    recognition.onend = function() {
        estaAProcessarVoz = false;
        // Só reinicia o microfone se o utilizador quiser e se a IA NÃO estiver a falar
        if (modoVozAtivo && deveraGravar && !window.speechSynthesis.speaking) {
            setTimeout(() => {
                if (modoVozAtivo && deveraGravar && !estaAProcessarVoz) {
                    try { recognition.start(); } catch(e) { console.log(e); }
                }
            }, 400); // Pequeno delay técnico para evitar estouro de buffer
        } else if (!modoVozAtivo) {
            desativarVisualMic();
        }
    };

    recognition.onerror = function(e) {
        console.log("Erro de captura:", e.error);
        estaAProcessarVoz = false;
        
        if (e.error === 'not-allowed') {
            alert("Ativa as permissões do microfone no teu navegador!");
            desativarModoVozCompleto();
        }
        // Se der erro de falta de som, não quebra a página, apenas tenta restabelecer com segurança
        if (e.error === 'no-speech' && modoVozAtivo) {
            desativarVisualMic();
            desativarModoVozCompleto();
        }
    };
}

function alternarModoVoz() {
    if (!recognition) return;

    if (!modoVozAtivo) {
        modoVozAtivo = true;
        deveraGravar = true;
        document.getElementById("btnVoz").innerText = "🎙️ Ouvindo...";
        document.getElementById("btnVoz").classList.add("gravando");
        window.speechSynthesis.cancel();
        try { recognition.start(); } catch(e) { console.log(e); }
    } else {
        desativarModoVozCompleto();
    }
}

function desativarVisualMic() {
    document.getElementById("btnVoz").innerText = "🎙️ Ativar Mãos Livres";
    document.getElementById("btnVoz").classList.remove("gravando");
}

function desativarModoVozCompleto() {
    modoVozAtivo = false;
    deveraGravar = false;
    desativarVisualMic();
    if(recognition) {
        try { recognition.stop(); } catch(e) {}
    }
    window.speechSynthesis.cancel();
}

function falarTexto(texto) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        
        let textoLimpo = texto.replace(/<\/?[^>]+(>|$)/g, "")
                              .replace(/[\*#_`~]/g, "")
                              .replace(/[🤖⚠️👨‍💻]/g, "");
        
        let utterance = new SpeechSynthesisUtterance(textoLimpo);
        utterance.lang = 'pt-PT';
        utterance.rate = 1.05;
        
        deveraGravar = false;
        if(recognition) {
            try { recognition.stop(); } catch(e) {}
        }

        utterance.onend = function() {
            if (modoVozAtivo) {
                deveraGravar = true;
                estaAProcessarVoz = false;
                try { recognition.start(); } catch(e) { console.log(e); }
            }
        };

        window.speechSynthesis.speak(utterance);
    }
}

function send() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value;
    if (!msg.trim()) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg user">
            <div class="bubble">${msg}</div>
        </div>
    `;

    msgInput.value = "";
    chat.scrollTop = chat.scrollHeight;

    let loadingId = "loading-" + Date.now();
    chat.innerHTML += `
        <div class="msg bot" id="${loadingId}">
            <div class="bubble" style="color: #94a3b8;">A processar áudio...</div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    // Desativa a escuta durante o envio HTTP para evitar ruídos
    deveraGravar = false; 
    if(recognition) { try { recognition.stop(); } catch(e){} }

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            history: chatHistory
        })
    })
    .then(res => res.json())
    .then(data => {
        const loadingEl = document.getElementById(loadingId);
        if(loadingEl) loadingEl.remove();

        chatHistory = data.history || chatHistory; 

        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble">${data.reply}</div>
            </div>
        `;
        
        falarTexto(data.reply);
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        const loadingEl = document.getElementById(loadingId);
        if(loadingEl) loadingEl.remove();
        
        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble" style="color: #f87171;">⚠️ Falha no fluxo.</div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
        if(modoVozAtivo) { deveraGravar = true; try { recognition.start(); } catch(e){} }
    });
}
</script>
