<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mello IA</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    width: 700px;
    display: flex;
    flex-direction: column;
    margin-top: 20px;
}

/* HEADER */
.header {
    background: white;
    padding: 15px 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h2 {
    margin: 0;
    font-size: 18px;
    color: #111827;
}

.header a {
    color: #ef4444;
    text-decoration: none;
    font-size: 13px;
}

/* CHAT BOX */
.chat-box {
    flex: 1;
    background: white;
    border-radius: 15px;
    padding: 20px;
    overflow-y: auto;
    height: 450px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* MENSAGENS */
.msg {
    margin: 10px 0;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.bot {
    justify-content: flex-start;
}

.bubble {
    max-width: 70%;
    padding: 12px 15px;
    border-radius: 15px;
    font-size: 14px;
    word-wrap: break-word;
}

.user .bubble {
    background: #3b82f6;
    color: white;
    border-bottom-right-radius: 5px;
}

.bot .bubble {
    background: #e5e7eb;
    color: #111827;
    border-bottom-left-radius: 5px;
}

/* INPUT */
.input-area {
    display: flex;
    margin-top: 15px;
    gap: 10px;
}

input {
    flex: 1;
    padding: 14px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    outline: none;
}

input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

button {
    padding: 14px 20px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>🤖 Mello IA</h2>
        <a href="/logout">Sair</a>
    </div>

    <!-- CHAT -->
    <div class="chat-box" id="chat"></div>

    <!-- INPUT -->
    <div class="input-area">
        <!-- ⌨️ Adicionado onkeydown para poderes enviar com o Enter do teclado -->
        <input id="msg" placeholder="Escreve para a Mello IA..." onkeydown="if(event.key === 'Enter') send()">
        <button onclick="send()">Enviar</button>
    </div>

</div>

<script>
// 🧠 Histórico guardado localmente no browser
let chatHistory = []; 

window.onload = function () {
    let chat = document.getElementById("chat");
    chat.innerHTML += `
        <div class="msg bot">
            <div class="bubble">
                🤖 Bem-vindo à <b>Mello IA</b>, criada pelo Eng. Ivanildo 👨‍💻
            </div>
        </div>
    `;
};

function send() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value;
    if (!msg.trim()) return;

    let chat = document.getElementById("chat");

    // 1. Mostra a mensagem do utilizador no ecrã
    chat.innerHTML += `
        <div class="msg user">
            <div class="bubble">${msg}</div>
        </div>
    `;

    // 2. Limpa o input IMEDIATAMENTE antes do fetch para evitar bugs com o innerHTML
    msgInput.value = "";
    chat.scrollTop = chat.scrollHeight;

    // 3. Cria um ID único para a mensagem de "A pensar..."
    let loadingId = "loading-" + Date.now();
    chat.innerHTML += `
        <div class="msg bot" id="${loadingId}">
            <div class="bubble" style="color: #64748b;">A processar...</div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    // 4. Faz o pedido à API Flask passando o histórico
    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            history: chatHistory
        })
    })
    .then(res => res.json())
    .then(data => {
        // Remove a mensagem de carregamento
        document.getElementById(loadingId).remove();

        if (data.error) {
            chat.innerHTML += `
                <div class="msg bot">
                    <div class="bubble" style="color: red;">⚠️ Erro: ${data.error}</div>
                </div>
            `;
        } else {
            // 🚀 Atualiza o histórico local recebido do Flask
            chatHistory = data.history; 

            // Coloca a resposta real da IA no ecrã usando data.reply
            chat.innerHTML += `
                <div class="msg bot">
                    <div class="bubble">${data.reply}</div>
                </div>
            `;
        }
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        document.getElementById(loadingId).remove();
        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble" style="color: red;">⚠️ Falha na ligação ao servidor.</div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
