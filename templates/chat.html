<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mello IA - Voice Engine</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    height: 100vh;
}

.container {
    width: 700px;
    display: flex;
    flex-direction: column;
    margin-top: 20px;
}

.header {
    background: #1e293b;
    padding: 15px 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h2 {
    margin: 0;
    font-size: 18px;
    color: #f8fafc;
}

.btn-sair {
    background: #ef4444;
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
    transition: background 0.2s;
}
.btn-sair:hover { background: #dc2626; }

.chat-box {
    flex: 1;
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    overflow-y: auto;
    height: 450px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.msg {
    margin: 10px 0;
    display: flex;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
    max-width: 70%;
    padding: 12px 15px;
    border-radius: 15px;
    font-size: 14px;
    word-wrap: break-word;
}

.user .bubble {
    background: #3b82f6;
    color: white;
    border-bottom-right-radius: 5px;
}

.bot .bubble {
    background: #334155;
    color: #f8fafc;
    border-bottom-left-radius: 5px;
}

.input-area {
    display: flex;
    margin-top: 15px;
    gap: 10px;
}

input {
    flex: 1;
    padding: 14px;
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 12px;
    color: white;
    outline: none;
}

input:focus { border-color: #3b82f6; }

button {
    padding: 14px 20px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}
button:hover { background: #2563eb; }

.btn-mic { background: #ef4444; }
.btn-mic:hover { background: #dc2626; }

.btn-mic.gravando {
    background: #22c55e;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <h2>🤖 Mello IA - Modo Conversação</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="btnVoz" class="btn-mic" onclick="alternarModoVoz()">🎙️ Ativar Mãos Livres</button>
            <a href="/logout" class="btn-sair">Sair</a>
        </div>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Escreve ou ativa o microfone..." onkeydown="if(event.key === 'Enter') send()">
        <button onclick="send()">Enviar</button>
    </div>

</div>

<script>
let chatHistory = []; 
let recognition;
let modoVozAtivo = false;
let deveraGravar = false;

window.onload = function () {
    let chat = document.getElementById("chat");
    chat.innerHTML += `
        <div class="msg bot">
            <div class="bubble">
                🤖 Infraestrutura neural ativa. Clica em <b>🎙️ Ativar Mãos Livres</b>, fala o teu comando e eu responderei diretamente por áudio!
            </div>
        </div>
    `;
    inicializarRecursosVoz();
};

function inicializarRecursosVoz() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("O teu navegador não suporta a API de áudio nativa.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'pt-PT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        let textoCapturado = event.results[0][0].transcript;
        document.getElementById("msg").value = textoCapturado;
        send();
    };

    recognition.onend = function() {
        if (modoVozAtivo && deveraGravar) {
            recognition.start();
        } else if (!modoVozAtivo) {
            desativarVisualMic();
        }
    };

    recognition.onerror = function(e) {
        console.log("Erro de captura:", e.error);
        if (e.error === 'not-allowed') {
            alert("Ativa as permissões de gravação do teu microfone.");
            desativarModoVozCompleto();
        }
    };
}

function alternarModoVoz() {
    if (!recognition) return;

    if (!modoVozAtivo) {
        modoVozAtivo = true;
        deveraGravar = true;
        document.getElementById("btnVoz").innerText = "🎙️ Ouvindo...";
        document.getElementById("btnVoz").classList.add("gravando");
        window.speechSynthesis.cancel();
        recognition.start();
    } else {
        desativarModoVozCompleto();
    }
}

function desativarVisualMic() {
    document.getElementById("btnVoz").innerText = "🎙️ Ativar Mãos Livres";
    document.getElementById("btnVoz").classList.remove("gravando");
}

function desativarModoVozCompleto() {
    modoVozAtivo = false;
    deveraGravar = false;
    desativarVisualMic();
    if(recognition) recognition.stop();
    window.speechSynthesis.cancel();
}

function falarTexto(texto) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        
        let textoLimpo = texto.replace(/<\/?[^>]+(>|$)/g, "")
                              .replace(/[\*#_`~]/g, "")
                              .replace(/[🤖⚠️👨‍💻]/g, "");
        
        let utterance = new SpeechSynthesisUtterance(textoLimpo);
        utterance.lang = 'pt-PT';
        utterance.rate = 1.05;
        
        deveraGravar = false;
        if(recognition) recognition.stop();

        utterance.onend = function() {
            if (modoVozAtivo) {
                deveraGravar = true;
                recognition.start();
            }
        };

        window.speechSynthesis.speak(utterance);
    }
}

function send() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value;
    if (!msg.trim()) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg user">
            <div class="bubble">${msg}</div>
        </div>
    `;

    msgInput.value = "";
    chat.scrollTop = chat.scrollHeight;

    let loadingId = "loading-" + Date.now();
    chat.innerHTML += `
        <div class="msg bot" id="${loadingId}">
            <div class="bubble" style="color: #94a3b8;">A processar áudio...</div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            history: chatHistory
        })
    })
    .then(res => res.json())
    .then(data => {
        const loadingEl = document.getElementById(loadingId);
        if(loadingEl) loadingEl.remove();

        chatHistory = data.history || chatHistory; 

        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble">${data.reply}</div>
            </div>
        `;
        
        falarTexto(data.reply);
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        const loadingEl = document.getElementById(loadingId);
        if(loadingEl) loadingEl.remove();
        
        chat.innerHTML += `
            <div class="msg bot">
                <div class="bubble" style="color: #f87171;">⚠️ Falha no fluxo.</div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
        if(modoVozAtivo) { deveraGravar = true; recognition.start(); }
    });
}
</script>

</body>
</html>
